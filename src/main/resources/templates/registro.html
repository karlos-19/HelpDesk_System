<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/registro.css}">
    <title>Registro</title>
</head>
<body>

<div class="register-container">

    <div class="form-box">
        <h1>Crie sua conta</h1>
        <p class="subtitle">Preencha os dados para continuar</p>

        <form action="/registrar" method="post">

            <div class="input-group">
                <label for="email">Nome de Usuario</label>
                <input type="text" id="email" name="usuario" placeholder="Digite o usuário" required>
            </div>

            <div class="input-group">
                <label for="senha">Digite sua Senha</label>
                <div class="input-wrap">
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required/>
                    <button type="button" class="toggle-senha" id="toggle-senha">
                        <svg id="icon-olho" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="input-group">
                <label for="confirmar">Confirmar senha</label>
                <div class="input-wrap">
                    <input type="password" id="confirmar" name="confirmar" placeholder="Confirme sua senha" required/>
                    <button type="button" class="toggle-senha" id="toggle-confirmar">
                        <svg id="icon-olho-confirmar" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button class="btn-register" type="submit">Registrar</button>

            <p class="login-link">
                Já tem conta? <a href="/login">Entrar</a>
            </p>

        </form>

    </div>

</div>

<script>
    const toggleSenha = document.getElementById('toggle-senha');
    const inputSenha = document.getElementById('senha');
    const iconSenha = document.getElementById('icon-olho');

    toggleSenha.addEventListener('click', function() {
        if (inputSenha.type === 'password') {
            inputSenha.type = 'text';
            iconSenha.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            `;
        } else {
            inputSenha.type = 'password';
            iconSenha.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            `;
        }
    });

    const toggleConfirmar = document.getElementById('toggle-confirmar');
    const inputConfirmar = document.getElementById('confirmar');
    const iconConfirmar = document.getElementById('icon-olho-confirmar');

    toggleConfirmar.addEventListener('click', function() {
        if (inputConfirmar.type === 'password') {
            inputConfirmar.type = 'text';
            iconConfirmar.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            `;
        } else {
            inputConfirmar.type = 'password';
            iconConfirmar.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            `;
        }
    });
</script>

</body>
</html>
