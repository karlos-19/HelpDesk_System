<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/login.css}">
    <title>Login</title>
</head>




<body>

<div class="card">
    <div class="header">
        <h1>Bem-vindo de volta</h1>
        <p class="subtitle">Entre com suas credenciais para continuar</p>
    </div>

    <form th:action="@{/login}" method="post">

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required/>
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <div class="input-wrap">
                <input type="password" id="senha" name="senha" placeholder="••••••••" required/>
                <button type="button" class="toggle-senha" id="toggle-senha">
                    <svg id="icon-olho" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
        </div>

        <button type="submit" class="btn-primary">Entrar</button>

        <p class="signup">
            Não tem uma conta? <a th:href="@{/registro}">Criar conta</a>
        </p>

    </form>

</div>

<script>
    const toggle = document.getElementById('toggle-senha');
    const input = document.getElementById('senha');
    const icon = document.getElementById('icon-olho');

    toggle.addEventListener('click', function() {
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            `;
        } else {
            input.type = 'password';
            icon.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            `;
        }
    });
</script>

</body>
</html>
